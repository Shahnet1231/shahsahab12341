<!DOCTYPE html>
<html><head><title>Stock Management</title>
<link rel="stylesheet" href="../assets/css/stock.css"></head>
<body>
<h1>Stock Management</h1>

<div class="cards">
<div class="card">Current Stock</div>
<div class="card">Low Stock</div>
<div class="card">Out Of Stock</div>
<div class="card">Stock Value</div>
</div>

<h2>Stock Adjustment</h2>
<form>
<input placeholder="Product Name">
<input placeholder="Current Qty">
<input placeholder="Adjustment Qty">
<select>
<option>Stock In</option>
<option>Stock Out</option>
</select>
<button type="button">Save Adjustment</button>
</form>

<h2>Stock History</h2>
<table border="1" width="100%">
<tr><th>Date</th><th>Product</th><th>Type</th><th>Qty</th></tr>
</table>

<footer>Powered By SHAH GROUP</footer>
</body></html>
