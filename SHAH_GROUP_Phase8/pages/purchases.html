<!DOCTYPE html>
<html><head><title>Purchase System</title>
<link rel="stylesheet" href="../assets/css/purchases.css"></head>
<body>
<h1>Purchase System</h1>

<h3>Purchase Entry</h3>

<form>
<input placeholder="Purchase No">
<input placeholder="Supplier Name">
<input placeholder="Product Name">
<input placeholder="Quantity">
<input placeholder="Purchase Price">

<select>
<option>Cash</option>
<option>Online</option>
<option>Credit</option>
</select>

<button type="button">Add Item</button>
</form>

<h2>Purchase Items</h2>
<table border="1" width="100%">
<tr><th>Product</th><th>Qty</th><th>Rate</th><th>Total</th></tr>
</table>

<div>
<button>Save Purchase</button>
<button>Purchase History</button>
<button>Update Stock</button>
</div>

<footer>Powered By SHAH GROUP</footer>
</body></html>
